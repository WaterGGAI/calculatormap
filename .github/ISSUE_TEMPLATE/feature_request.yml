name: Feature request
description: Suggest a new calculator, workflow, or platform improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. The most helpful requests explain the user need and the expected outcome.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: Users need a faster way to compare ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add a calculator or workflow that ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public calculator experience
        - zh-TW localization
        - Guides and content
        - Admin workflows
        - AI SEO automation
        - Cloudflare deployment
        - Developer experience
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Examples, reference sites, edge cases, or formula notes.
